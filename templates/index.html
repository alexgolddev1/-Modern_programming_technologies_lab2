{% extends "layout.html" %}

{% block title %}Home{% endblock %}

{% block content %}
<section class="card hero">
    <h1>Лаб 2</h1>
    <div class="stats">
        <div class="stat">
            <span class="stat-label">Orders in database</span>
            <span class="stat-value">{{ orders_count }}</span>
        </div>
    </div>
    <div class="actions">
        <a class="button" href="{% url 'order_list' %}">Open orders</a>
        <a class="button secondary" href="{% url 'order_create' %}">Create order</a>
    </div>
</section>
{% endblock %}
